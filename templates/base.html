{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Email Context System</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="#">
            Email Context System
        </a>
        <div class="d-flex ms-auto">

            <a href="{% url 'logout' %}" class="btn btn-outline-danger" style="background: white;">
                Logout
            </a>

        </div>
        {% if request.user.is_authenticated %}

            <span class="text-white me-3">
                {{ request.user.email }}
            </span>

        {% endif %}

    </div>

</nav>

<div class="container-fluid">

    <div class="row">

        <div class="col-md-2 bg-light vh-100 border-end">

            <div class="mt-4">

                <h5>Navigation</h5>

                <hr>

                <a href="{% url 'dashboard' %}">
                    Dashboard
                </a>

                <a href="{% url 'client-list' %}" class="d-block mb-3 text-decoration-none">
                    Clients
                </a>

                <a href="{% url 'report-dashboard' %}">Reports</a>
                <div class="d-flex ms-auto">


                </div>

            </div>

        </div>

        <div class="col-md-10 p-4">

            {% block content %}

            {% endblock %}

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
