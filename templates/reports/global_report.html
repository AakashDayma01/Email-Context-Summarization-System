{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">

Global Report

</h2>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>

<th>Firm</th>

<th>Generated Summaries</th>

</tr>

</thead>

<tbody>

{% for report in reports %}

<tr>

<td>{{ report.firm }}</td>

<td>{{ report.count }}</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
