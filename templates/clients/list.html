{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <h2>Clients</h2>

    <span class="badge bg-primary">
        Total Clients: {{ clients.count }}
    </span>

</div>

<div class="card">

    <div class="card-body">

        <table class="table table-hover align-middle">

            <thead class="table-primary">

                <tr>

                    <th>ID</th>

                    <th>Client Name</th>

                    <th>Firm</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

            {% for client in clients %}

                <tr>

                    <td>{{ client.id }}</td>

                    <td>{{ client.name }}</td>

                    <td>{{ client.firm.name }}</td>

                    <td>

                        <a href="{% url 'client-detail' client.id %}" class="btn btn-sm btn-primary">
                            View Details
                        </a>
                    </td>

                </tr>

            {% empty %}

                <tr>

                    <td colspan="4" class="text-center">

                        No Clients Found

                    </td>

                </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
